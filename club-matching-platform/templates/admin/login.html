{% extends "base.html" %}

{% block title %}社团管理登录 - 社团通{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-4">
            <h2 class="text-center mb-4">🔐 社团管理登录</h2>

            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">社团ID</label>
                            <input type="number" class="form-control" name="club_id" required placeholder="请输入社团ID">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">管理密码</label>
                            <input type="password" class="form-control" name="password" required placeholder="请输入管理密码">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">提示：社团ID和密码请咨询平台管理员</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
